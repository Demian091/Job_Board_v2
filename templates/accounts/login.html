{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Login - JobBoard{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card">
                <div class="card-body">
                    <h3 class="card-title text-center mb-4">Welcome Back</h3>
                    <form method="post">
                        {% csrf_token %}
                        {{ form|crispy }}
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">Sign In</button>
                        </div>
                    </form>
                    <hr>
                    <p class="text-center mb-0">
                        Don't have an account?<br>
                        <a href="{% url 'signup_jobseeker' %}">Sign up as Job Seeker</a> or 
                        <a href="{% url 'signup_employer' %}">Employer</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
