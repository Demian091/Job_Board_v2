{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}{% if object %}Edit{% else %}Post New{% endif %} Job - JobBoard{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-body">
                    <h3 class="card-title mb-4">
                        {% if object %}
                            <i class="bi bi-pencil-square me-2"></i>Edit Job Posting
                        {% else %}
                            <i class="bi bi-plus-circle me-2"></i>Post a New Job
                        {% endif %}
                    </h3>
                    
                    <form method="post" novalidate>
                        {% csrf_token %}
                        {{ form|crispy }}
                        
                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-primary btn-lg">
                                {% if object %}
                                    <i class="bi bi-save me-2"></i>Save Changes
                                {% else %}
                                    <i class="bi bi-send me-2"></i>Post Job
                                {% endif %}
                            </button>
                            <a href="{% url 'jobs:my_jobs' %}" class="btn btn-outline-secondary">
                                <i class="bi bi-x-circle me-2"></i>Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
